services:

  db:
    image: postgres:15
    container_name: kintai-db
    environment:
      POSTGRES_USER: tw40
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kintai
    ports:
      - "5433:5432"

  vault:
    image: hashicorp/vault:latest
    container_name: kintai-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: true
    ports:
      - "8200:8200"

  app:
    build: .
    container_name: kintai-app
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_VAULT_HOST: vault
      SPRING_CLOUD_VAULT_PORT: 8200
      SPRING_CLOUD_VAULT_TOKEN: root
      SPRING_CLOUD_VAULT_SCHEME: http
    depends_on:
      - db
      - vault
